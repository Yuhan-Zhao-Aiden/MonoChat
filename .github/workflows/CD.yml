# Required GitHub repository secrets:
#   AWS_ROLE_ARN       — ARN of the IAM role to assume via OIDC
#                        (e.g. arn:aws:iam::520209748020:role/monochat-github-actions)
#   EC2_INSTANCE_ID    — EC2 instance ID to deploy to (e.g. i-0abc123def456)
#
# Required IAM permissions on AWS_ROLE_ARN:
#   ECR: GetAuthorizationToken (on *), and on the repo:
#        GetDownloadUrlForLayer, BatchGetImage, BatchCheckLayerAvailability,
#        InitiateLayerUpload, UploadLayerPart, CompleteLayerUpload, PutImage
#   SSM: SendCommand (on the EC2 instance and AWS-RunShellScript document)
#        GetCommandInvocation (on *)
#
# Required IAM permissions on the EC2 instance role:
#   ECR: GetAuthorizationToken (on *), and on the repo:
#        GetDownloadUrlForLayer, BatchGetImage, BatchCheckLayerAvailability
#   SSM: (already granted by AmazonSSMManagedInstanceCore managed policy)

name: CD — Build, push to ECR, deploy to EC2

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  ECR_REGISTRY:   520209748020.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: yuhanzhao/monochat
  AWS_REGION:     us-east-1
  CONTAINER_NAME: monochat
  CONTAINER_PORT: 5555

# id-token:write is required to request the OIDC JWT for AWS credential exchange.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_BASE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}"

          docker build -t "${IMAGE_BASE}:${SHORT_SHA}" .

          # Always push the immutable SHA-tagged image
          docker push "${IMAGE_BASE}:${SHORT_SHA}"

          # :latest tracks the main branch
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker tag  "${IMAGE_BASE}:${SHORT_SHA}" "${IMAGE_BASE}:latest"
            docker push "${IMAGE_BASE}:latest"
          fi

          # :v1.2.3 tracks version tags
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            docker tag  "${IMAGE_BASE}:${SHORT_SHA}" "${IMAGE_BASE}:${GITHUB_REF_NAME}"
            docker push "${IMAGE_BASE}:${GITHUB_REF_NAME}"
          fi

          echo "image=${IMAGE_BASE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2 via SSM Run Command
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          REGISTRY="${{ env.ECR_REGISTRY }}"
          REGION="${{ env.AWS_REGION }}"
          PORT="${{ env.CONTAINER_PORT }}"
          NAME="${{ env.CONTAINER_NAME }}"

          # Build the deploy script as a JSON array of shell commands.
          # Each command is a separate element so SSM captures per-command exit codes.
          PARAMS=$(printf \
            '{"commands":["aws ecr get-login-password --region %s | docker login --username AWS --password-stdin %s","docker pull %s","docker stop %s || true","docker rm %s || true","docker run -d --name %s -p %s:%s --restart unless-stopped %s"]}' \
            "$REGION" "$REGISTRY" "$IMAGE" "$NAME" "$NAME" "$NAME" "$PORT" "$PORT" "$IMAGE")

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA::7}" \
            --parameters "$PARAMS" \
            --region "$REGION" \
            --output text \
            --query 'Command.CommandId')

          echo "SSM command ID: ${COMMAND_ID}"

          # Block until the remote command finishes or times out (~5 min).
          # The waiter exits 255 on Failed status — ignore it and check ourselves below.
          aws ssm wait command-executed \
            --command-id  "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region      "$REGION" || true

          RESULT=$(aws ssm get-command-invocation \
            --command-id  "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region      "$REGION")

          STATUS=$(echo "$RESULT" | jq -r '.StatusDetails')
          echo "--- Remote stdout ---"
          echo "$RESULT" | jq -r '.StandardOutputContent'
          echo "--- Remote stderr ---"
          echo "$RESULT" | jq -r '.StandardErrorContent'
          echo "Deployment status: ${STATUS}"
          [[ "${STATUS}" == "Success" ]] || exit 1
